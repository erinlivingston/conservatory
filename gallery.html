<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conservatory | All rooms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" defer></script>
    <script src="scripts/sky-cycle.js" defer></script>
    <script src="scripts/sky-gradient-clouds.js" defer></script>
    <script src="scripts/gallery-sky.js" defer></script>
    <script src="scripts/drawn-plant-layer.js" defer></script>
    <script src="scripts/conservatory-storage.js" defer></script>
    <script src="scripts/nav-enter.js" defer></script>
    <script src="scripts/gallery.js" defer></script>
  </head>
  <body class="room-page gallery-page">
    <div id="gallery-sky-bg" class="gallery-sky-bg" aria-hidden="true"></div>
    <div class="scene-shell gallery-shell">
      <header class="room-header gallery-header">
        <h1>Your four biomes</h1>
      </header>

      <p id="gallery-tour-status" class="gallery-status" role="status"></p>

      <div class="gallery-grid" role="region" aria-label="Saved conservatory scenes">
        <figure class="gallery-figure">
          <h2 class="gallery-panel-title">Palm House</h2>
          <div class="scene-viewport gallery-viewport" data-gallery-room="palmhouse">
            <img
              src="assets/palmhouse.png"
              alt=""
              class="greenhouse-layer"
              width="400"
              height="600"
            />
            <div id="plant-layer-gallery-palmhouse" class="layer plant-layer" aria-hidden="true"></div>
          </div>
        </figure>
        <figure class="gallery-figure">
          <h2 class="gallery-panel-title">Rainforest</h2>
          <div class="scene-viewport gallery-viewport" data-gallery-room="rainforest">
            <img
              src="assets/Jungle2.png"
              alt=""
              class="greenhouse-layer"
              width="400"
              height="600"
            />
            <div id="plant-layer-gallery-rainforest" class="layer plant-layer" aria-hidden="true"></div>
          </div>
        </figure>
        <figure class="gallery-figure">
          <h2 class="gallery-panel-title">Desert</h2>
          <div class="scene-viewport gallery-viewport" data-gallery-room="desert">
            <img
              src="assets/desert.png"
              alt=""
              class="greenhouse-layer"
              width="400"
              height="600"
            />
            <div id="plant-layer-gallery-desert" class="layer plant-layer" aria-hidden="true"></div>
          </div>
        </figure>
        <figure class="gallery-figure">
          <h2 class="gallery-panel-title">Aquatic</h2>
          <div class="scene-viewport gallery-viewport" data-gallery-room="aquatic">
            <img
              src="assets/aquatic2.png"
              alt=""
              class="greenhouse-layer"
              width="400"
              height="600"
            />
            <div id="plant-layer-gallery-aquatic" class="layer plant-layer" aria-hidden="true"></div>
          </div>
        </figure>
      </div>

      <section
        id="animal-eyespy-panel"
        class="animal-eyespy-panel"
        aria-labelledby="animal-eyespy-heading"
        hidden
      >
        <h2 id="animal-eyespy-heading">Animal eye spy</h2>
        <p class="animal-eyespy-intro">
          Now that all four biomes have plants, you can play animal eye spy.
          When you spot one, tap it: you will jump to the next room until
          all four are found.
        </p>
        <div class="animal-preview-row animal-eyespy-preview" aria-hidden="true">
          <img
            class="animal-preview-row__item animal-preview-row__item--bird"
            src="assets/drawneyespyassets/birdeyespy.png"
            alt=""
            decoding="async"
          />
          <img
            class="animal-preview-row__item animal-preview-row__item--frog"
            src="assets/drawneyespyassets/frogeyespy.png"
            alt=""
            decoding="async"
          />
          <img
            class="animal-preview-row__item animal-preview-row__item--civet"
            src="assets/drawneyespyassets/palmciveteyespy.png"
            alt=""
            decoding="async"
          />
          <img
            class="animal-preview-row__item animal-preview-row__item--desert-rat"
            src="assets/drawneyespyassets/desertrateyespy.png"
            alt=""
            decoding="async"
          />
        </div>
        <div class="animal-eyespy-actions">
          <button type="button" id="animal-eyespy-hide-in-rooms" class="regen-button animal-eyespy-primary-btn">
            Hide animals
          </button>
          <button type="button" id="animal-eyespy-clear" class="regen-button eyespy-secondary-btn" hidden>
            Remove animals
          </button>
        </div>
        <p id="animal-eyespy-status" class="animal-eyespy-status" role="status"></p>
      </section>

      <div class="gallery-toolbar" role="group" aria-label="Gallery actions">
        <a class="enter-button gallery-toolbar-link" href="palm-house.html">Edit rooms</a>
        <a class="enter-button gallery-toolbar-link gallery-toolbar-link--quiet" href="index.html">Entrance</a>
        <button type="button" id="gallery-start-over" class="control-done-button gallery-toolbar-reset">
          Start over
        </button>
      </div>

    </div>
  </body>
</html>
